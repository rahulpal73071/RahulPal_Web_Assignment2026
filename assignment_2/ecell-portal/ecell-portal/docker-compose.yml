version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecell_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks:
      - ecell_net

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # In production, migrations should ideally be a separate one-off job, 
    # but for simplicity, we keep them here.
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file: .env
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    # Remove ports 8000 in prod; let Nginx handle all external traffic
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecell_net

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on:
      - redis
    networks:
      - ecell_net

  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      - redis
    networks:
      - ecell_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ecell_net

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" # Added for SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/usr/share/nginx/static:ro
      - media_files:/usr/share/nginx/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro # For SSL Certificates
    depends_on:
      - web
      - frontend
    networks:
      - ecell_net

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

networks:
  ecell_net:
    driver: bridge